spring:
  application:
    name: books-crud-redis

  datasource:
    url: jdbc:postgresql://localhost:5432/booksdb
    username: postgres
    password: pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 600s
      cache-null-values: false

server:
  port: 8081

logging:
  level:
    com.example: DEBUG
    org.springframework.cache: DEBUG
    org.springframework.data.redis: DEBUG
